<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Production Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">📊 Production Analytics - Admin</span>
        <a href="/admin/dashboard" class="btn btn-light">Back to Dashboard</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-6">
            <div class="card shadow h-100">
                <div class="card-header bg-primary text-white">
                    <h5>Total Production per Machine</h5>
                </div>
                <div class="card-body">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Machine</th>
                                <th>Units Produced</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="entry : ${report}">
                                <td th:text="${entry.key}"></td>
                                <td th:text="${entry.value}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow h-100">
                <div class="card-header bg-white">
                    <h5>Factory Output Distribution</h5>
                </div>
                <div class="card-body d-flex justify-content-center">
                    <div style="width: 80%;">
                        <canvas id="adminPieChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const rawData = [[${adminChartData}]];
    const labels = Object.keys(rawData);
    const values = Object.values(rawData);

    const ctx = document.getElementById('adminPieChart').getContext('2d');
    new Chart(ctx, {
        type: 'doughnut', // Different style from Employee's bar chart
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: [
                    '#0d6efd', '#6610f2', '#6f42c1', '#d63384', '#dc3545', '#fd7e14'
                ],
                hoverOffset: 4
            }]
        },
        options: {
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });
</script>

</body>
</html>
