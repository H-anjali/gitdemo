<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Intelligent Manufacturing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Matches the soft, clean aesthetic of your login pages */
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .portal-card {
            border: none;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05) !important;
            max-width: 500px;
        }
        .btn-portal {
            padding: 15px;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        /* Admin Button Style */
        .btn-admin-select {
            background-color: #ffffff;
            color: #1e293b;
        }
        .btn-admin-select:hover {
            background-color: #f1f5f9;
            border-color: #1e293b;
            transform: translateY(-2px);
        }
        /* Employee Button Style */
        .btn-employee-select {
            background-color: #ffffff;
            color: #16a34a;
        }
        .btn-employee-select:hover {
            background-color: #f0fdf4;
            border-color: #16a34a;
            transform: translateY(-2px);
        }
        .system-title {
            color: #0f172a;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .icon-box {
            font-size: 1.5rem;
        }
    </style>
</head>

<body>

<div class="container vh-100 d-flex align-items-center justify-content-center">

    <div class="text-center w-100">

        <h1 class="system-title display-5 mb-5">
            🏭 Intelligent Manufacturing Throughput Maximizer System<br>
        </h1>

        <div class="card p-5 mx-auto portal-card">

            <h5 class="text-muted text-uppercase fw-bold mb-4" style="letter-spacing: 1px;">Select Portal</h5>

            <div class="d-grid gap-3">
                <a href="/admin-login" class="btn btn-portal btn-admin-select shadow-sm">
                    <span>👑 Login as Admin</span>
                    <span class="icon-box">→</span>
                </a>

                <a href="/employee-login" class="btn btn-portal btn-employee-select shadow-sm">
                    <span>👷 Login as Employee</span>
                    <span class="icon-box">→</span>
                </a>
            </div>

        </div>

        <p class="mt-5 text-muted small">&copy; 2026 Smart Manufacturing Solutions</p>

    </div>

</div>

</body>
</html>
