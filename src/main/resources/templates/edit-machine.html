<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Machine</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">✏ Edit Machine</span>
        <a href="/admin/dashboard" class="btn btn-light">Back</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-warning">
            <h5>Update Machine Details</h5>
        </div>

        <div class="card-body">

            <form action="/admin/update-machine" method="post">

                <input type="hidden" name="machineId" th:value="${machine.machineId}">

                <div class="mb-3">
                    <label class="form-label">Machine Name</label>
                    <input type="text" name="machineName"
                           class="form-control"
                           th:value="${machine.machineName}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Max Capacity</label>
                    <input type="number" name="maxCapacity"
                           class="form-control"
                           th:value="${machine.maxCapacity}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        <option value="ACTIVE"
                                th:selected="${machine.status == 'ACTIVE'}">ACTIVE</option>
                        <option value="MAINTENANCE"
                                th:selected="${machine.status == 'MAINTENANCE'}">MAINTENANCE</option>
                        <option value="BREAKDOWN"
                                th:selected="${machine.status == 'BREAKDOWN'}">BREAKDOWN</option>
                    </select>
                </div>

                <button class="btn btn-warning">Update Machine</button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
