<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">👷 Intelligent Manufacturing - Employee</span>
        <form action="/logout" method="post">
            <button class="btn btn-danger">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <!-- Machines Section -->
    <div class="card shadow mb-4">
        <div class="card-header bg-primary text-white">
            <h5>Machines</h5>
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Capacity</th>
                    <th>Status</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="m : ${machines}">
                    <td th:text="${m.machineId}"></td>
                    <td th:text="${m.machineName}"></td>
                    <td th:text="${m.maxCapacity}"></td>

                    <td>
                        <span th:if="${m.status == 'ACTIVE'}" class="badge bg-success">ACTIVE</span>
                        <span th:if="${m.status == 'MAINTENANCE'}" class="badge bg-warning text-dark">MAINTENANCE</span>
                        <span th:if="${m.status == 'BREAKDOWN'}" class="badge bg-danger">BREAKDOWN</span>
                    </td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>

    <div th:if="${error}" class="alert alert-danger">
    <span th:text="${error}"></span>
</div>


    <!-- Dispatch Job -->
    <div class="card shadow mb-4">
        <div class="card-header bg-success text-white">
            <h5>Dispatch Job</h5>
        </div>

        <div class="card-body">
            <form action="/employee/add-log" method="post" class="row g-3">
                <div class="col-md-4">
                    <input type="number" name="machineId" class="form-control" placeholder="Machine ID" required>
                </div>
                <div class="col-md-4">
                    <input type="text" name="batchId" class="form-control" placeholder="Batch ID" required>
                </div>
                <div class="col-md-4">
                    <input type="number" name="unitsProduced" class="form-control" placeholder="Units Produced" required>
                </div>

                <div class="col-12">
                    <button class="btn btn-success">Submit Production</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Production Logs -->
    <div class="card shadow mb-4">
        <div class="card-header bg-secondary text-white">
            <h5>Production Logs</h5>
        </div>

        <div class="card-body">

            <table class="table table-striped">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Machine</th>
                    <th>Batch</th>
                    <th>Units</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="l : ${logs}">
                    <td th:text="${l.logId}"></td>
                    <td th:text="${l.machine != null ? l.machine.machineName : 'N/A'}"></td>
                    <td th:text="${l.batchId}"></td>
                    <td th:text="${l.unitsProduced}"></td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

    <!-- Performance Button -->
    <div class="text-center mb-5">
        <a href="/employee/performance" class="btn btn-dark btn-lg">
            View My Performance
        </a>
    </div>

</div>

</body>
</html>
