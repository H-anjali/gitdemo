<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Performance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">📈 My Performance</span>
        <a href="/employee/dashboard" class="btn btn-light">Back</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow text-center h-100">
                <div class="card-body">
                    <h3 class="mb-4">Total Units</h3>
                    <h1 class="display-3 text-success" th:text="${totalUnits}"></h1>
                    <p class="text-muted mt-3">Keep up the good work 👏</p>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow h-100">
                <div class="card-header bg-white">
                    <h5>Throughput by Machine</h5>
                </div>
                <div class="card-body">
                    <canvas id="throughputChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    /* Access the data passed from Spring Boot */
    const chartData = [[${chartData}]];
    const labels = Object.keys(chartData);
    const values = Object.values(chartData);

    const ctx = document.getElementById('throughputChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar', // You can change this to 'line' or 'pie'
        data: {
            labels: labels,
            datasets: [{
                label: 'Units Produced',
                data: values,
                backgroundColor: 'rgba(25, 135, 84, 0.6)',
                borderColor: 'rgba(25, 135, 84, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
</script>

</body>
</html>
