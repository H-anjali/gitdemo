<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Professional soft gradient instead of harsh solid blue */
            background: linear-gradient(135deg, #ece9e6 0%, #ffffff 100%);
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 12px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1) !important;
        }
        .btn-admin {
            background-color: #212529; /* Darker, sophisticated admin color */
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-admin:hover {
            background-color: #000000;
            transform: translateY(-1px);
        }
        .form-control {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #dee2e6;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25 margin-rgba(33, 37, 41, 0.1);
            border-color: #212529;
        }
        .login-title {
            color: #212529;
            font-weight: 700;
        }
    </style>
</head>

<body>

<div class="container vh-100 d-flex align-items-center justify-content-center">

    <div class="card p-5 login-card" style="width:420px;">

        <div class="text-center mb-4">
            <h2 class="login-title">👑 Admin Portal</h2>
            <p class="text-muted small">System Management Login</p>
        </div>

        <form method="post" action="/login">

            <div class="mb-4">
                <label class="form-label fw-bold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="admin_user" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-admin text-white w-100 mb-3">
                Log In
            </button>

        </form>

        <div class="text-center mt-2">
            <a href="/" class="text-decoration-none text-muted small">← Back to Home</a>
        </div>

    </div>

</div>

</body>
</html>
