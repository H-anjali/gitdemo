<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Soft professional green gradient instead of solid bright green */
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05) !important;
        }
        .btn-employee {
            background-color: #16a34a; /* Professional Emerald Green */
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-employee:hover {
            background-color: #15803d;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.2);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #e5e7eb;
            background-color: #f9fafb;
        }
        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.1);
            border-color: #16a34a;
            background-color: #ffffff;
        }
        .login-title {
            color: #111827;
            font-weight: 700;
        }
    </style>
</head>

<body>

<div class="container vh-100 d-flex align-items-center justify-content-center">

    <div class="card p-5 login-card" style="width:420px;">

        <div class="text-center mb-4">
            <h2 class="login-title">👷 Employee Login</h2>
            <p class="text-muted small">Access your production dashboard</p>
        </div>

        <form method="post" action="/login">

            <div class="mb-4">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-employee text-white w-100 mb-3">
                Login to Dashboard
            </button>

        </form>

        <div class="text-center mt-2">
            <a href="/" class="text-decoration-none text-muted small">← Back to Selection Portal</a>
        </div>

    </div>

</div>

</body>
</html>
